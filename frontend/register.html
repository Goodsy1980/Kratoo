<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchoolConnect - สมัครสมาชิก</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="login-wrapper">
    <div class="login-container">
      
      <div class="login-header">
        <h1 class="site-title heading-font">📝 สมัครสมาชิก</h1>
        <p class="subtitle">สร้างบัญชีผู้ใช้ใหม่เพื่อเข้าร่วม SchoolConnect</p>
      </div>

      <form class="login-form" id="register-form">
        
        <div class="form-group">
          <label for="reg-username" class="form-label">ชื่อผู้ใช้งาน (Username)</label>
          <input 
            id="reg-username" 
            type="text" 
            class="form-input" 
            required 
            placeholder="ตั้งชื่อผู้ใช้งานของคุณ..."
          >
        </div>

        <div class="form-group">
          <label for="reg-password" class="form-label">รหัสผ่าน (Password)</label>
          <input 
            id="reg-password" 
            type="password" 
            class="form-input" 
            required 
            placeholder="ตั้งรหัสผ่านที่ปลอดภัย..."
          >
        </div>

        <button type="submit" class="btn-submit">
          ยืนยันการสมัครสมาชิก
        </button>

      </form>

      <div class="register-link-container">
        <p>มีบัญชีอยู่แล้ว? <a href="index.html" class="register-link">กลับไปหน้าเข้าสู่ระบบ</a></p>
      </div>

    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
